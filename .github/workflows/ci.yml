name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests (core code, no data download)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: System audio libs
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install torch==2.2.2 --index-url https://download.pytorch.org/whl/cpu
          pip install "numpy<2" scipy soundfile praat-parselmouth pytest

      - name: Byte-compile all sources
        run: python -m compileall -q ghostprint scripts demo.py

      - name: Run smoke tests
        run: pytest -q tests/
